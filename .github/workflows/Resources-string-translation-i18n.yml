name: AI String Translation (Format Preserved)

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'SiliconFlow API Key'
        required: true
      base_url:
        description: 'API Base URL'
        default: 'https://api.siliconflow.cn'
      target_files:
        description: 'Files to translate (e.g. strings.xml, titles.xml)'
        default: 'strings.xml'
        required: true

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.10', cache: 'pip' }
      - run: pip install openai
      
      - name: Run AI Translation
        env: { PYTHONUNBUFFERED: 1 }
        run: |
          python translate_android.py \
            --api_key "${{ github.event.inputs.api_key }}" \
            --base_url "${{ github.event.inputs.base_url }}" \
            --files "${{ github.event.inputs.target_files }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: translated-xml
          path: |
            core/**/values-*/*.xml
